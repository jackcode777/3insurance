<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="input">
      <strong>
      <label for="input">Declared value in (RM):</label>
      </strong>
      <br>
      <input type="number" id="input" placeholder="0.00" required>
      <br>
      <label for="courier">Courier fee (RM):</label>
      <input type="number" id="courier" placeholder="Optional">
      <div id="error"></div>
      <button id="btn">Check</button> 
    </section>
    <section class="output">
     <div class="container">
        <strong><label>Total Amount:</label></div></strong>
        <p id="op">RM 0.00</p><br>
        <label>Insurance Amount:</label>
        <p id="insurance">RM 0.00</p>
     </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
