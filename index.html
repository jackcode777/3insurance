<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="input">
      <strong>
      <label for="input">Declared value in (RM):</label>
      </strong>
      <br>
      <input type="number" id="input" placeholder="Enter" required>
      <div id="error"></div>
      <br>
      <br>
      <button id="btn">Check</button>
    </section>
    <br>
    <br>
    <br>
    <section class="output">
     <div class="container"><strong><p id="op">RM 0.00</p></strong></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
